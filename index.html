<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Chat LGDC - v1.00.01</title>
    <style>
        :root {
            --primary: #8e44ad;
            --secondary: #2c3e50;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--secondary);
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 300px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #732d91;
        }

        .btn-secondary {
            background-color: var(--secondary);
            margin-bottom: 15px;
        }

        .btn-secondary:hover {
            background-color: #1a252f;
        }

        .result-box {
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 6px 6px 0;
        }

        .generated-name {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            color: var(--primary);
            padding: 10px;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>🐱 Outils de Jeux de Rôle - La Guerre des Clans 🐱</h1>

    <div class="container">
        <!-- GÉNÉRATEUR DE NOMS -->
        <div class="card">
            <h2>Générateur de Noms</h2>
            <p>Trouve une idée de nom unique pour ton guerrier !</p>
            <div id="nomGenere" class="generated-name">Clique pour générer...</div>
            <button class="btn-secondary" onclick="genererNom()">🎲 Générer un nom</button>
            <button onclick="copierNomDansFormulaire()">📥 Utiliser ce nom pour la fiche</button>
        </div>

        <!-- CRÉATEUR DE FICHE RP -->
        <div class="card">
            <h2>Fiche de Personnage</h2>
            <form id="rpForm" onsubmit="creerFiche(event)">
                <div class="form-group">
                    <label for="nomChat">Nom du Chat :</label>
                    <input type="text" id="nomChat" required placeholder="Ex: Poil de Coton">
                </div>

                <div class="form-group">
                    <label for="clanChat">Clan :</label>
                    <select id="clanChat">
                        <option value="Clan du Tonnerre">⚡ Clan du Tonnerre</option>
                        <option value="Clan de la Rivière">💧 Clan de la Rivière</option>
                        <option value="Clan care">💨 Clan du Vent</option>
                        <option value="Clan de l'Ombre">🌲 Clan de l'Ombre</option>
                        <option value="Clan du Ciel">☁️ Clan du Ciel</option>
                        <option value="Clan des Étoiles">✨ Clan des Étoiles</option>
                        <option value="Solitaire / Chat domestique">🏠 Solitaire / Chat domestique</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gradeChat">Grade :</label>
                    <select id="gradeChat">
                        <option value="Chaton">Chaton</option>
                        <option value="Apprenti">Apprenti</option>
                        <option value="Guerrier">Guerrier</option>
                        <option value="Lieutenant">Lieutenant</option>
                        <option value="Chef">Chef</option>
                        <option value="Guérisseur">Guérisseur</option>
                        <option value="Ancien">Ancien</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="physiqueChat">Description Physique :</label>
                    <textarea id="physiqueChat" rows="3" required placeholder="Ex: Un grand chat blanc aux yeux bleus..."></textarea>
                </div>

                <div class="form-group">
                    <label for="caractereChat">Caractère :</label>
                    <textarea id="caractereChat" rows="3" required placeholder="Ex: Courageux, un peu têtu mais très loyal..."></textarea>
                </div>

                <button type="submit">📝 Générer la Fiche RP</button>
            </form>

            <div id="ficheResultat" class="result-box" style="display: none;">
                <h3>Fiche de RP validée !</h3>
                <div id="contenuFiche"></div>
            </div>
        </div>
    </div>

    <script>
        // Listes pour le générateur de noms sur le thème LGDC
        const prefixes = ["Poil", "Cœur", "Pelage", "Plume", "Nuage", "Étoile", "Feuille", "Patte", "Griffe", "Museau", "Œil", "Aile", "Feu", "Tempête", "Givre", "Ombre", "Fleur"];
        const suffixes = ["de Coton", "de Pâquerette", "de Jais", "de Lion", "de Feu", "de Glace", "de Rose", "de Nuit", "de Brume", "de Cerise", "de Miel", "d'Argent", "de Cendres", "de Silex", "de Lys"];

        let nomActuel = "";

        // Fonction pour générer un nom aléatoire
        function genererNom() {
            const prefi = prefixes[Math.floor(Math.random() * prefixes.length)];
            const suffi = suffixes[Math.floor(Math.random() * suffixes.length)];
            
            // Éviter des doublons étranges comme "Feu de Feu"
            nomActuel = `${prefi} ${suffi}`;
            document.getElementById('nomGenere').innerText = nomActuel;
        }

        // Fonction pour injecter le nom généré dans le formulaire de la fiche
        function copierNomDansFormulaire() {
            if (nomActuel === "") {
                alert("Génère d'abord un nom avec le dé !");
                return;
            }
            document.getElementById('nomChat').value = nomActuel;
        }

        // Fonction pour créer la fiche RP finale
        function creerFiche(event) {
            event.preventDefault(); // Empêche la page de se recharger

            const nom = document.getElementById('nomChat').value;
            const clan = document.getElementById('clanChat').value;
            const grade = document.getElementById('gradeChat').value;
            const physique = document.getElementById('physiqueChat').value;
            const caractere = document.getElementById('caractereChat').value;

            const boxResultat = document.getElementById('ficheResultat');
            const contenu = document.getElementById('contenuFiche');

            // Structure du texte de la fiche de RP
            contenu.innerHTML = `
                <p><strong>Nom :</strong> ${nom}</p>
                <p><strong>Clan :</strong> ${clan}</p>
                <p><strong>Grade :</strong> ${grade}</p>
                <p><strong>Physique :</strong> ${physique}</p>
                <p><strong>Caractère :</strong> ${caractere}</p>
            `;

            // Afficher le bloc de résultat
            boxResultat.style.display = "block";
            boxResultat.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
